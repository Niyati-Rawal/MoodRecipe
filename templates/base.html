<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}MoodRecipe{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #F5F0E8; --warm-white: #FAF7F2; --olive: #3D4A2E;
    --olive-mid: #5C6E46; --olive-light: #8FA66E; --terracotta: #C4622D;
    --terracotta-light: #E8936A; --sand: #D4B896; --sand-light: #EAD9C4;
    --charcoal: #1E1E1E; --muted: #7A7060; --border: rgba(61,74,46,0.15);
    --error: #8B2000; --error-bg: #FDF0E8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 3rem; border-bottom: 1px solid var(--border);
    background: var(--warm-white); position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--olive); text-decoration: none; }
  .logo span { color: var(--terracotta); font-style: italic; }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .nav-user { font-size: 0.85rem; color: var(--muted); }
  .nav-user strong { color: var(--olive); font-weight: 500; }
  .btn-nav {
    padding: 0.45rem 1rem; border-radius: 100px; font-size: 0.85rem; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; border: 1.5px solid var(--border);
    background: transparent; color: var(--olive); text-decoration: none; display: inline-block;
    transition: all 0.2s;
  }
  .btn-nav:hover { background: var(--sand-light); }
  .btn-nav.primary { background: var(--olive); color: var(--cream); border-color: var(--olive); }
  .btn-nav.primary:hover { background: var(--olive-mid); }

  /* Auth forms */
  .auth-page { min-height: calc(100vh - 73px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .auth-card {
    background: var(--warm-white); border-radius: 20px; padding: 2.5rem;
    width: min(440px, 100%); box-shadow: 0 32px 80px rgba(30,30,30,0.1);
  }
  .auth-logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--olive); margin-bottom: 0.5rem; }
  .auth-logo span { color: var(--terracotta); font-style: italic; }
  .auth-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 2rem; }
  .field { margin-bottom: 1.1rem; }
  .field label { display: block; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.45rem; }
  .field-input, input.field-input {
    width: 100%; padding: 0.7rem 0.9rem; border: 1.5px solid var(--border);
    border-radius: 10px; background: var(--cream); font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; color: var(--charcoal); outline: none; transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--olive-light); }
  .field-errors { font-size: 0.8rem; color: var(--error); margin-top: 0.35rem; }
  .form-errors {
    background: var(--error-bg); border: 1.5px solid var(--terracotta);
    border-radius: 8px; padding: 0.65rem 0.9rem; font-size: 0.82rem;
    color: var(--error); margin-bottom: 1rem;
  }
  .btn-full {
    width: 100%; background: var(--terracotta); color: #fff; border: none;
    padding: 0.875rem; border-radius: 12px; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .btn-full:hover { background: #B05526; }
  .auth-link { font-size: 0.82rem; color: var(--muted); text-align: center; margin-top: 1rem; }
  .auth-link a { color: var(--terracotta); }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; background: var(--olive); color: var(--cream);
    padding: 0.7rem 1.1rem; border-radius: 10px; font-size: 0.85rem; font-weight: 500;
    z-index: 1000; transform: translateY(100px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: #8B2000; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  footer { border-top: 1px solid var(--border); padding: 1.75rem 3rem; display: flex; justify-content: space-between; align-items: center; background: var(--warm-white); }
  .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--olive); }
  .footer-logo span { color: var(--terracotta); font-style: italic; }
  .footer-note { font-size: 0.78rem; color: var(--muted); font-family: 'DM Mono', monospace; }
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>

<nav>
  <a class="logo" href="/">Mood<span>Recipe</span></a>
  <div class="nav-right">
    {% if user.is_authenticated %}
      <div class="nav-user">Hello, <strong>{{ user.username }}</strong></div>
      <button class="btn-nav" onclick="loadSavedRecipes()">Saved recipes</button>
      <a class="btn-nav" href="/logout/">Sign out</a>
    {% else %}
      <a class="btn-nav" href="/login/">Sign in</a>
      <a class="btn-nav primary" href="/signup/">Sign up</a>
    {% endif %}
  </div>
</nav>

{% block content %}{% endblock %}

<div class="toast" id="toast"></div>

<footer>
  <div class="footer-logo">Mood<span>Recipe</span></div>
  <div class="footer-note">eat how you feel ✦</div>
</footer>

<script>
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Get CSRF token from cookie (Django sets it automatically)
function getCsrf() {
  return document.cookie.split(';').map(c => c.trim())
    .find(c => c.startsWith('csrftoken='))?.split('=')[1] || '';
}

async function apiFetch(url, options = {}) {
  return fetch(url, {
    ...options,
    credentials: 'same-origin',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': getCsrf(),
      ...(options.headers || {}),
    },
  });
}
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
